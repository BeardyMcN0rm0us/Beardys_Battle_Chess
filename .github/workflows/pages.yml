name: "Deploy to GitHub Pages"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Publish the site as the gh-pages branch. Creating that branch
      # auto-enables GitHub Pages (classic branch mode) — no admin API needed.
      # If the site doesn't appear, enable it once in Settings → Pages →
      # Deploy from a branch → gh-pages / (root).
      - name: Publish to gh-pages branch
        run: |
          rm -rf .git
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Beardy's Battle Chess (${GITHUB_SHA::7})"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
